<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPCIÓN 3 - AR Sin Marcadores</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        .info-overlay {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(156,39,176,0.95);
            color: white; padding: 20px;
            text-align: center; z-index: 1000;
        }
        .info-overlay h2 { margin: 0 0 10px 0; }
        .controls {
            position: fixed; bottom: 80px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 999;
        }
        .btn {
            background: rgba(255,255,255,0.95);
            color: #9C27B0; padding: 15px 25px;
            border: none; border-radius: 25px;
            font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-size: 1em;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .instructions {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white;
            padding: 15px 30px; border-radius: 25px;
            z-index: 999; text-align: center;
            max-width: 90%;
        }
        .status {
            position: fixed; top: 80px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white;
            padding: 15px 30px; border-radius: 15px;
            z-index: 999; text-align: center;
        }
        .status.active { background: rgba(76,175,80,0.9); }
        #ar-scene {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div class="info-overlay">
        <h2>🎯 OPCIÓN 3: AR Sin Marcadores</h2>
        <p style="margin: 5px 0; font-size: 0.9em;">Toca la pantalla para colocar objetos 3D</p>
        <p style="margin: 5px 0; font-size: 0.8em;">⚡ Ventaja: Sin papel | ⚠️ Menos preciso, requiere superficie plana</p>
    </div>

    <div class="status" id="status">
        📱 Apunta a una superficie plana y toca para colocar
    </div>

    <div class="controls">
        <button class="btn" onclick="addNinja()">🥷 Ninja</button>
        <button class="btn" onclick="addHero()">🦸‍♀️ Heroína</button>
        <button class="btn" onclick="addRobot()">🤖 Robot</button>
        <button class="btn" onclick="clearAll()">🗑️ Limpiar</button>
    </div>

    <div class="instructions">
        👆 Toca los botones para agregar personajes AR
    </div>

    <a-scene 
        id="ar-scene"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;"
        vr-mode-ui="enabled: false"
        cursor="rayOrigin: mouse"
        raycaster="objects: .clickable">
        
        <!-- Contenedor para objetos colocados -->
        <a-entity id="content-container"></a-entity>

        <!-- Cámara con cursor -->
        <a-entity camera look-controls>
            <a-cursor
                id="cursor"
                animation__click="property: scale; startEvents: click; from: 0.1 0.1 0.1; to: 1 1 1; dur: 150"
                animation__fusing="property: fusing; startEvents: fusing; from: 1 1 1; to: 0.1 0.1 0.1; dur: 1500"
                event-set__mouseenter="_event: mouseenter; color: springgreen"
                event-set__mouseleave="_event: mouseleave; color: black"
                raycaster="objects: .clickable">
            </a-cursor>
        </a-entity>

        <!-- Luz ambiental -->
        <a-entity light="type: ambient; color: #FFF; intensity: 0.8"></a-entity>
        <a-entity light="type: directional; color: #FFF; intensity: 0.5" position="1 1 1"></a-entity>
    </a-scene>

    <script>
        let objectCount = 0;
        const container = document.querySelector('#content-container');
        const status = document.getElementById('status');
        const camera = document.querySelector('[camera]');

        function getPositionInFrontOfCamera(distance = 2) {
            const cameraEl = document.querySelector('[camera]');
            const cameraPosition = cameraEl.object3D.position;
            const cameraRotation = cameraEl.object3D.rotation;
            
            // Calcular posición frente a la cámara
            const position = {
                x: cameraPosition.x - Math.sin(cameraRotation.y) * distance,
                y: cameraPosition.y - 0.5, // Un poco abajo
                z: cameraPosition.z - Math.cos(cameraRotation.y) * distance
            };
            
            return position;
        }

        function addNinja() {
            objectCount++;
            const pos = getPositionInFrontOfCamera(2);
            
            const entity = document.createElement('a-entity');
            entity.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);
            entity.innerHTML = `
                <a-box position="0 0.5 0" scale="0.3 0.6 0.2" color="#1a1a1a"
                       animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear">
                </a-box>
                <a-sphere position="0 1 0" radius="0.2" color="#2a2a2a"></a-sphere>
                <a-sphere position="-0.08 1.05 0.15" radius="0.03" color="#00ff00"></a-sphere>
                <a-sphere position="0.08 1.05 0.15" radius="0.03" color="#00ff00"></a-sphere>
                <a-text value="🥷 Ninja ${objectCount}" position="0 1.5 0" align="center" width="2" color="#00ff00"></a-text>
                <a-cylinder position="0 0 0" radius="0.4" height="0.05" color="#00d4ff"></a-cylinder>
            `;
            
            container.appendChild(entity);
            updateStatus(`✅ Ninja ${objectCount} agregado!`);
        }

        function addHero() {
            objectCount++;
            const pos = getPositionInFrontOfCamera(2);
            
            const entity = document.createElement('a-entity');
            entity.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);
            entity.innerHTML = `
                <a-box position="0 0.8 0" scale="0.35 0.5 0.25" color="#ff0033"
                       animation="property: scale; from: 0.35 0.5 0.25; to: 0.37 0.52 0.27; loop: true; dur: 2000; dir: alternate">
                </a-box>
                <a-box position="0 0.3 0" scale="0.35 0.5 0.25" color="#0033ff"></a-box>
                <a-sphere position="0 1.25 0" radius="0.18" color="#ffd0b3"></a-sphere>
                <a-cone position="0 1.45 0" radius-bottom="0.2" radius-top="0.05" height="0.3" color="#663300"></a-cone>
                <a-plane position="0 0.7 -0.15" width="0.5" height="0.8" color="#ffcc00"
                         animation="property: rotation; from: 0 -5 0; to: 0 5 0; loop: true; dur: 2000; dir: alternate">
                </a-plane>
                <a-text value="🦸‍♀️ Hero ${objectCount}" position="0 1.8 0" align="center" width="2" color="#ff1493"></a-text>
                <a-cylinder position="0 0 0" radius="0.4" height="0.05" color="#ff1493"></a-cylinder>
            `;
            
            container.appendChild(entity);
            updateStatus(`✅ Heroína ${objectCount} agregada!`);
        }

        function addRobot() {
            objectCount++;
            const pos = getPositionInFrontOfCamera(2);
            
            const entity = document.createElement('a-entity');
            entity.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);
            entity.innerHTML = `
                <a-box position="0 0.5 0" scale="0.4 0.5 0.3" color="#607D8B"></a-box>
                <a-box position="0 1.1 0" scale="0.35 0.35 0.35" color="#455A64"></a-box>
                <a-sphere position="-0.1 1.15 0.2" radius="0.05" color="#00ff00"
                          animation="property: components.material.material.color; from: #00ff00; to: #ffff00; loop: true; dur: 500">
                </a-sphere>
                <a-sphere position="0.1 1.15 0.2" radius="0.05" color="#00ff00"
                          animation="property: components.material.material.color; from: #00ff00; to: #ffff00; loop: true; dur: 500">
                </a-sphere>
                <a-cylinder position="-0.25 0.5 0" radius="0.08" height="0.6" color="#546E7A"></a-cylinder>
                <a-cylinder position="0.25 0.5 0" radius="0.08" height="0.6" color="#546E7A"></a-cylinder>
                <a-text value="🤖 Robot ${objectCount}" position="0 1.6 0" align="center" width="2" color="#00bcd4"></a-text>
                <a-cylinder position="0 0 0" radius="0.4" height="0.05" color="#00bcd4"
                            animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
                </a-cylinder>
            `;
            
            container.appendChild(entity);
            updateStatus(`✅ Robot ${objectCount} agregado!`);
        }

        function clearAll() {
            container.innerHTML = '';
            objectCount = 0;
            updateStatus('🗑️ Todos los objetos eliminados');
        }

        function updateStatus(message) {
            status.textContent = message;
            status.classList.add('active');
            setTimeout(() => {
                status.classList.remove('active');
                status.textContent = '📱 Toca un botón para agregar personajes';
            }, 2000);
        }

        // Inicialización
        document.addEventListener('DOMContentLoaded', () => {
            console.log('AR Markerless iniciado');
            updateStatus('✅ Cámara lista - Toca los botones');
        });
    </script>
</body>
</html>
