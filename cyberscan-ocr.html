<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberScan AR - Escanea y Aprende</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        #video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
        }
        
        #camera {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        #canvas {
            display: none;
        }
        
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: center;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .header h1 {
            font-size: 1.5em;
            margin: 0;
        }
        
        .scan-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border: 3px solid #00ff00;
            border-radius: 20px;
            z-index: 999;
            pointer-events: none;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                border-color: #00ff00;
                box-shadow: 0 0 20px rgba(0,255,0,0.5);
            }
            50% {
                border-color: #00ffff;
                box-shadow: 0 0 40px rgba(0,255,255,0.8);
            }
        }
        
        .scan-indicator::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            border: 2px dashed #00ff00;
            border-radius: 20px;
            animation: rotate 10s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .status-bar {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 20px 30px;
            border-radius: 25px;
            z-index: 999;
            text-align: center;
            max-width: 90%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        
        .status-bar.found {
            background: rgba(76,175,80,0.95);
            animation: bounce 0.5s;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.1); }
        }
        
        .status-text {
            font-size: 1.1em;
            font-weight: bold;
        }
        
        .detected-word {
            font-size: 1.5em;
            color: #00ff00;
            margin-top: 10px;
        }
        
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 999;
        }
        
        .btn {
            background: rgba(102,126,234,0.95);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn.scanning {
            background: rgba(76,175,80,0.95);
            animation: pulse-btn 1s infinite;
        }
        
        @keyframes pulse-btn {
            0%, 100% { box-shadow: 0 4px 15px rgba(76,175,80,0.5); }
            50% { box-shadow: 0 4px 25px rgba(76,175,80,0.8); }
        }
        
        .definition-card {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 1001;
            max-width: 90%;
            width: 400px;
            display: none;
            animation: slideDown 0.5s;
        }
        
        @keyframes slideDown {
            from {
                transform: translateX(-50%) translateY(-100px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }
        
        .definition-card.show {
            display: block;
        }
        
        .definition-card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.8em;
        }
        
        .definition-card p {
            color: #333;
            line-height: 1.6;
            font-size: 1.1em;
        }
        
        .definition-card .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff4444;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
        }
        
        .word-list {
            position: fixed;
            top: 70px;
            right: 20px;
            background: rgba(255,255,255,0.95);
            padding: 15px;
            border-radius: 15px;
            z-index: 998;
            max-width: 200px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .word-list h3 {
            color: #667eea;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        
        .word-list ul {
            list-style: none;
            padding: 0;
        }
        
        .word-list li {
            padding: 8px;
            margin: 5px 0;
            background: #f0f0f0;
            border-radius: 8px;
            font-size: 0.85em;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔍 CyberScan AR - Escanea Palabras</h1>
    </div>

    <div id="video-container">
        <video id="camera" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="scan-indicator"></div>

    <div class="status-bar" id="status">
        <div class="status-text">📸 Apunta a una palabra de ciberseguridad</div>
        <div class="detected-word" id="detected-word"></div>
    </div>

    <div class="word-list">
        <h3>📚 Palabras Detectables:</h3>
        <ul id="word-list"></ul>
    </div>

    <div class="definition-card" id="definition-card">
        <button class="close-btn" onclick="closeDefinition()">✕</button>
        <h2 id="def-title"></h2>
        <p id="def-text"></p>
        <div id="def-character"></div>
    </div>

    <div class="controls">
        <button class="btn" id="scan-btn" onclick="toggleScanning()">
            🔍 Iniciar Escaneo
        </button>
    </div>

    <script>
        // Base de datos de palabras de ciberseguridad
        const cyberDictionary = {
            'PHISHING': {
                definition: 'Es un tipo de ataque donde los ciberdelincuentes se hacen pasar por entidades confiables para robar información sensible como contraseñas o datos bancarios.',
                character: '🎣',
                color: '#ff4444'
            },
            'MALWARE': {
                definition: 'Software malicioso diseñado para dañar, explotar o infiltrarse en un sistema informático sin autorización. Incluye virus, troyanos y ransomware.',
                character: '🦠',
                color: '#ff6b6b'
            },
            'RANSOMWARE': {
                definition: 'Tipo de malware que cifra los archivos de la víctima y exige un rescate (generalmente en criptomonedas) para recuperar el acceso.',
                character: '🔒',
                color: '#ee5a6f'
            },
            'FIREWALL': {
                definition: 'Sistema de seguridad que monitorea y controla el tráfico de red entrante y saliente, actuando como una barrera entre redes confiables y no confiables.',
                character: '🛡️',
                color: '#4CAF50'
            },
            'HACKER': {
                definition: 'Persona con habilidades técnicas para explorar sistemas informáticos. Pueden ser éticos (white hat) que mejoran la seguridad, o maliciosos (black hat).',
                character: '👨‍💻',
                color: '#667eea'
            },
            'PASSWORD': {
                definition: 'Contraseña o clave secreta usada para autenticar tu identidad. Debe ser fuerte: mínimo 12 caracteres, mezcla de letras, números y símbolos.',
                character: '🔑',
                color: '#9C27B0'
            },
            'VIRUS': {
                definition: 'Programa malicioso que se replica e infecta otros archivos o sistemas. Puede dañar datos, robar información o permitir acceso remoto no autorizado.',
                character: '🦠',
                color: '#E91E63'
            },
            'CIBERSEGURIDAD': {
                definition: 'Práctica de proteger sistemas, redes y programas de ataques digitales. Incluye medidas preventivas y reactivas para salvaguardar la información.',
                character: '🔐',
                color: '#2196F3'
            },
            'TECLADO': {
                definition: 'Dispositivo de entrada de información que tiene teclas con letras, números y símbolos para introducir datos en una computadora.',
                character: '⌨️',
                color: '#00BCD4'
            },
            'SPAM': {
                definition: 'Correo electrónico no solicitado enviado en masa, generalmente con fines publicitarios o maliciosos. Puede contener phishing o malware.',
                character: '📧',
                color: '#FF9800'
            }
        };

        let isScanning = false;
        let worker = null;
        let video = null;
        let canvas = null;
        let ctx = null;
        let scanInterval = null;

        // Inicializar
        window.addEventListener('DOMContentLoaded', async () => {
            video = document.getElementById('camera');
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');

            // Mostrar palabras disponibles
            const wordList = document.getElementById('word-list');
            Object.keys(cyberDictionary).forEach(word => {
                const li = document.createElement('li');
                li.textContent = word;
                wordList.appendChild(li);
            });

            // Iniciar cámara
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                video.srcObject = stream;
            } catch (err) {
                alert('Error al acceder a la cámara: ' + err.message);
            }

            // Inicializar Tesseract
            worker = await Tesseract.createWorker('spa');
            console.log('OCR listo');
        });

        async function toggleScanning() {
            const btn = document.getElementById('scan-btn');
            const status = document.getElementById('status');

            if (!isScanning) {
                isScanning = true;
                btn.textContent = '⏸️ Detener Escaneo';
                btn.classList.add('scanning');
                status.querySelector('.status-text').textContent = '🔍 Escaneando...';

                // Escanear cada 2 segundos
                scanInterval = setInterval(scanForWords, 2000);
            } else {
                isScanning = false;
                btn.textContent = '🔍 Iniciar Escaneo';
                btn.classList.remove('scanning');
                status.querySelector('.status-text').textContent = '📸 Escaneo detenido';
                clearInterval(scanInterval);
            }
        }

        async function scanForWords() {
            if (!video.videoWidth) return;

            // Capturar frame de video
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);

            try {
                // Reconocer texto
                const { data: { text } } = await worker.recognize(canvas);
                console.log('Texto detectado:', text);

                // Buscar palabras clave
                const upperText = text.toUpperCase();
                for (const word in cyberDictionary) {
                    if (upperText.includes(word)) {
                        console.log('¡Palabra encontrada!', word);
                        showDefinition(word);
                        break;
                    }
                }
            } catch (err) {
                console.error('Error OCR:', err);
            }
        }

        function showDefinition(word) {
            const status = document.getElementById('status');
            const detectedWord = document.getElementById('detected-word');
            const card = document.getElementById('definition-card');
            const title = document.getElementById('def-title');
            const text = document.getElementById('def-text');

            const data = cyberDictionary[word];

            // Actualizar status
            status.classList.add('found');
            detectedWord.textContent = `✅ ${word}`;

            // Mostrar tarjeta
            title.textContent = `${data.character} ${word}`;
            title.style.color = data.color;
            text.textContent = data.definition;
            card.classList.add('show');

            // Vibrar si está disponible
            if (navigator.vibrate) {
                navigator.vibrate(200);
            }

            // Pausar escaneo temporalmente
            if (isScanning) {
                clearInterval(scanInterval);
                setTimeout(() => {
                    if (isScanning) {
                        scanInterval = setInterval(scanForWords, 2000);
                    }
                }, 5000);
            }
        }

        function closeDefinition() {
            const card = document.getElementById('definition-card');
            const status = document.getElementById('status');
            const detectedWord = document.getElementById('detected-word');

            card.classList.remove('show');
            status.classList.remove('found');
            detectedWord.textContent = '';
        }
    </script>
</body>
</html>
