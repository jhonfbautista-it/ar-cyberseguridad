<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPCIÓN 2 - QR/Imagen Personalizada</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        .info-overlay {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(255,87,34,0.95);
            color: white; padding: 20px;
            text-align: center; z-index: 1000;
        }
        .info-overlay h2 { margin: 0 0 10px 0; }
        .instructions {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white;
            padding: 15px 30px; border-radius: 25px;
            z-index: 999; text-align: center;
            max-width: 90%;
        }
        .qr-examples {
            position: fixed; top: 80px; right: 20px;
            background: rgba(255,255,255,0.95);
            padding: 15px; border-radius: 15px;
            z-index: 999; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            max-width: 200px;
        }
        .qr-examples h3 { 
            margin: 0 0 10px 0; color: #ff5722; font-size: 1em;
        }
        .qr-box {
            width: 150px; height: 150px;
            background: white; border: 2px solid #333;
            margin: 10px 0; display: flex;
            align-items: center; justify-content: center;
            position: relative;
        }
        .qr-label {
            position: absolute; bottom: -25px;
            font-size: 0.8em; color: #333;
            font-weight: bold;
        }
        .status {
            position: fixed; top: 150px; left: 20px;
            background: rgba(0,0,0,0.8); color: white;
            padding: 10px 20px; border-radius: 10px;
            z-index: 999; font-size: 0.9em;
        }
        .status.found { background: rgba(76,175,80,0.9); }
        .barcode-scanner {
            display: none;
        }
    </style>
</head>
<body>
    <div class="info-overlay">
        <h2>🔍 OPCIÓN 2: QR/Imagen Personalizada</h2>
        <p style="margin: 5px 0; font-size: 0.9em;">Escanea códigos de barras o cualquier imagen</p>
        <p style="margin: 5px 0; font-size: 0.8em;">⚡ Ventaja: Usa tus propias imágenes | ⚠️ Requiere configuración extra</p>
    </div>

    <div class="qr-examples">
        <h3>📱 Prueba con:</h3>
        <div class="qr-box">
            <svg width="140" height="140" viewBox="0 0 140 140">
                <!-- QR Code simulado -->
                <rect width="140" height="140" fill="white"/>
                <rect x="10" y="10" width="30" height="30" fill="black"/>
                <rect x="50" y="10" width="10" height="30" fill="black"/>
                <rect x="70" y="10" width="10" height="10" fill="black"/>
                <rect x="90" y="10" width="10" height="30" fill="black"/>
                <rect x="110" y="10" width="20" height="30" fill="black"/>
                <rect x="10" y="50" width="10" height="10" fill="black"/>
                <rect x="30" y="50" width="10" height="10" fill="black"/>
                <rect x="50" y="50" width="30" height="10" fill="black"/>
                <rect x="90" y="50" width="20" height="10" fill="black"/>
                <rect x="120" y="50" width="10" height="10" fill="black"/>
                <rect x="10" y="70" width="10" height="10" fill="black"/>
                <rect x="30" y="70" width="30" height="10" fill="black"/>
                <rect x="70" y="70" width="20" height="10" fill="black"/>
                <rect x="100" y="70" width="10" height="10" fill="black"/>
                <rect x="120" y="70" width="10" height="10" fill="black"/>
                <rect x="10" y="90" width="20" height="10" fill="black"/>
                <rect x="40" y="90" width="10" height="10" fill="black"/>
                <rect x="60" y="90" width="30" height="10" fill="black"/>
                <rect x="100" y="90" width="30" height="10" fill="black"/>
                <rect x="10" y="110" width="30" height="20" fill="black"/>
                <rect x="50" y="110" width="10" height="20" fill="black"/>
                <rect x="70" y="110" width="20" height="20" fill="black"/>
                <rect x="100" y="110" width="10" height="20" fill="black"/>
                <rect x="120" y="110" width="10" height="20" fill="black"/>
            </svg>
            <div class="qr-label">QR Ejemplo 1</div>
        </div>
        <p style="font-size: 0.8em; color: #666; margin-top: 30px;">
            O cualquier código de barras/QR
        </p>
    </div>

    <div class="status" id="status">🔍 Escanea un código...</div>

    <div class="instructions">
        📸 Apunta a un código QR o de barras
    </div>

    <!-- Modo barcode para detectar QR codes -->
    <a-scene
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
        vr-mode-ui="enabled: false"
        renderer="logarithmicDepthBuffer: true;">
        
        <!-- Detección de Barcode Matrix (tipo QR simplificado) -->
        <a-marker type="barcode" value="0" id="barcode-0">
            <a-entity position="0 0 0">
                <a-box position="0 0.5 0" scale="0.4 0.4 0.4" color="#4CAF50"
                       animation="property: rotation; to: 360 360 0; loop: true; dur: 5000; easing: linear">
                </a-box>
                <a-text value="Codigo 0" position="0 1.2 0" align="center" width="2" color="#4CAF50"></a-text>
            </a-entity>
        </a-marker>

        <a-marker type="barcode" value="1" id="barcode-1">
            <a-entity position="0 0 0">
                <a-sphere position="0 0.5 0" radius="0.3" color="#2196F3"
                         animation="property: scale; from: 1 1 1; to: 1.3 1.3 1.3; loop: true; dur: 2000; dir: alternate">
                </a-sphere>
                <a-text value="Codigo 1" position="0 1.2 0" align="center" width="2" color="#2196F3"></a-text>
            </a-entity>
        </a-marker>

        <a-marker type="barcode" value="2" id="barcode-2">
            <a-entity position="0 0 0">
                <a-cylinder position="0 0.5 0" radius="0.2" height="0.8" color="#FF9800"
                           animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear">
                </a-cylinder>
                <a-text value="Codigo 2" position="0 1.2 0" align="center" width="2" color="#FF9800"></a-text>
            </a-entity>
        </a-marker>

        <a-marker type="barcode" value="3" id="barcode-3">
            <a-entity position="0 0 0">
                <a-cone position="0 0.5 0" radius-bottom="0.3" radius-top="0" height="0.8" color="#E91E63"
                        animation="property: position; from: 0 0.5 0; to: 0 0.8 0; loop: true; dur: 2000; dir: alternate">
                </a-cone>
                <a-text value="Codigo 3" position="0 1.2 0" align="center" width="2" color="#E91E63"></a-text>
            </a-entity>
        </a-marker>

        <!-- Marcador genérico de backup -->
        <a-marker preset="hiro" id="backup-marker">
            <a-entity position="0 0 0">
                <a-text value="QR Generico Detectado" position="0 0.5 0" align="center" width="2" color="#9C27B0"></a-text>
                <a-octahedron position="0 0.2 0" radius="0.3" color="#9C27B0"
                              animation="property: rotation; to: 360 360 360; loop: true; dur: 6000; easing: linear">
                </a-octahedron>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const status = document.getElementById('status');
        let currentMarker = null;

        // Detectar todos los marcadores de barcode
        for(let i = 0; i <= 3; i++) {
            const marker = document.getElementById(`barcode-${i}`);
            if(marker) {
                marker.addEventListener('markerFound', () => {
                    status.textContent = `✅ Código ${i} detectado!`;
                    status.classList.add('found');
                    currentMarker = i;
                });
                marker.addEventListener('markerLost', () => {
                    if(currentMarker === i) {
                        status.textContent = '🔍 Escanea un código...';
                        status.classList.remove('found');
                        currentMarker = null;
                    }
                });
            }
        }

        // Backup marker
        const backup = document.getElementById('backup-marker');
        if(backup) {
            backup.addEventListener('markerFound', () => {
                if(currentMarker === null) {
                    status.textContent = '✅ Marcador genérico detectado!';
                    status.classList.add('found');
                }
            });
            backup.addEventListener('markerLost', () => {
                if(currentMarker === null) {
                    status.textContent = '🔍 Escanea un código...';
                    status.classList.remove('found');
                }
            });
        }
    </script>
</body>
</html>
