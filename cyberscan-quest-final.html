<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberScan Quest - AR Adventure</title>
    
    <!-- Librerías -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&family=Fredoka:wght@400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Fredoka', 'Comic Sans MS', cursive;
            overflow: hidden;
            background: #000;
        }
        
        /* Video Feed */
        #video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        #camera {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        #canvas {
            display: none;
        }
        
        /* Header con Stats */
        .game-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #FF6B9D 0%, #C06C84 100%);
            padding: 15px 20px;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .game-title {
            font-family: 'Comic Neue', cursive;
            font-size: 1.4em;
            color: #FFF;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.3);
            font-weight: 700;
        }
        
        .stats-container {
            display: flex;
            gap: 15px;
        }
        
        .stat-box {
            background: rgba(255,255,255,0.95);
            padding: 8px 15px;
            border-radius: 20px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            font-weight: 700;
        }
        
        .stat-label {
            font-size: 0.7em;
            color: #666;
        }
        
        .stat-value {
            font-size: 1.2em;
            color: #FF6B9D;
        }
        
        /* Scan Frame */
        .scan-zone {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 400px;
            height: 280px;
            border: 4px dashed #FFD93D;
            border-radius: 25px;
            z-index: 900;
            pointer-events: none;
            animation: scan-pulse 2s ease-in-out infinite;
        }
        
        @keyframes scan-pulse {
            0%, 100% { 
                border-color: #FFD93D;
                box-shadow: 0 0 20px rgba(255,217,61,0.5);
            }
            50% { 
                border-color: #6BCF7F;
                box-shadow: 0 0 30px rgba(107,207,127,0.7);
            }
        }
        
        .scan-corners {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 5px solid #FF6B9D;
        }
        
        .corner-tl { top: -5px; left: -5px; border-right: none; border-bottom: none; border-radius: 20px 0 0 0; }
        .corner-tr { top: -5px; right: -5px; border-left: none; border-bottom: none; border-radius: 0 20px 0 0; }
        .corner-bl { bottom: -5px; left: -5px; border-right: none; border-top: none; border-radius: 0 0 0 20px; }
        .corner-br { bottom: -5px; right: -5px; border-left: none; border-top: none; border-radius: 0 0 20px 0; }
        
        /* Status Bar */
        .status-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #6BCF7F 0%, #4ECDC4 100%);
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            z-index: 1000;
            font-weight: 700;
            font-size: 1.1em;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 90%;
        }
        
        .status-bar.scanning {
            background: linear-gradient(135deg, #FFD93D 0%, #FFA07A 100%);
            animation: status-bounce 1s infinite;
        }
        
        @keyframes status-bounce {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.05); }
        }
        
        /* AR Card Overlay (Fallback 2D) */
        .ar-card-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s;
        }
        
        .ar-card-overlay.show {
            display: flex;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .ar-card {
            background: linear-gradient(145deg, #ffffff 0%, #f0f0f0 100%);
            border-radius: 30px;
            padding: 30px;
            max-width: 90%;
            width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            animation: cardPop 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 6px solid;
            position: relative;
        }
        
        @keyframes cardPop {
            0% {
                transform: scale(0.3) rotate(-10deg);
                opacity: 0;
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }
        
        .mascot-container {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .mascot-emoji {
            font-size: 6em;
            animation: mascotBounce 1s ease-in-out infinite;
            display: inline-block;
        }
        
        @keyframes mascotBounce {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }
        
        .word-title {
            font-family: 'Comic Neue', cursive;
            font-size: 2.5em;
            font-weight: 700;
            text-align: center;
            margin: 15px 0;
            text-transform: uppercase;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.1);
        }
        
        .definition-text {
            font-size: 1.15em;
            line-height: 1.7;
            color: #333;
            text-align: center;
            margin: 20px 0;
        }
        
        .points-badge {
            background: linear-gradient(135deg, #FFD93D 0%, #FFA07A 100%);
            color: white;
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 1.3em;
            font-weight: 700;
            text-align: center;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(255,160,122,0.4);
        }
        
        .timer-bar {
            width: 100%;
            height: 6px;
            background: rgba(0,0,0,0.1);
            border-radius: 3px;
            margin-top: 20px;
            overflow: hidden;
        }
        
        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #6BCF7F, #4ECDC4);
            animation: timerShrink 5s linear;
        }
        
        @keyframes timerShrink {
            from { width: 100%; }
            to { width: 0%; }
        }
        
        /* Victory Modal */
        .victory-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #FF6B9D 0%, #C06C84 100%);
            z-index: 3000;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 20px;
        }
        
        .victory-modal.show {
            display: flex;
            animation: victoryAppear 0.5s;
        }
        
        @keyframes victoryAppear {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .victory-content {
            text-align: center;
            color: white;
        }
        
        .victory-title {
            font-family: 'Comic Neue', cursive;
            font-size: 4em;
            font-weight: 700;
            margin-bottom: 20px;
            text-shadow: 4px 4px 0 rgba(0,0,0,0.3);
            animation: victoryPulse 1s infinite;
        }
        
        @keyframes victoryPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .victory-stars {
            font-size: 3em;
            margin: 20px 0;
        }
        
        .final-stats {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            margin: 20px 0;
        }
        
        .final-stat {
            font-size: 1.5em;
            margin: 10px 0;
        }
        
        .restart-btn {
            background: white;
            color: #FF6B9D;
            border: none;
            padding: 20px 50px;
            border-radius: 30px;
            font-size: 1.3em;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            font-family: 'Fredoka', cursive;
        }
        
        .restart-btn:active {
            transform: scale(0.95);
        }
        
        /* Music Toggle */
        .music-toggle {
            position: fixed;
            bottom: 100px;
            right: 20px;
            background: rgba(255,255,255,0.9);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        /* Confetti */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #FFD93D;
            animation: confettiFall 3s linear;
            z-index: 2500;
        }
        
        @keyframes confettiFall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Game Header -->
    <div class="game-header">
        <div class="game-title">🎮 CyberScan Quest!</div>
        <div class="stats-container">
            <div class="stat-box">
                <div class="stat-label">Palabras</div>
                <div class="stat-value" id="word-count">0/15</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Puntos</div>
                <div class="stat-value" id="points">0</div>
            </div>
        </div>
    </div>

    <!-- Video Feed -->
    <div id="video-container">
        <video id="camera" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <!-- Scan Zone -->
    <div class="scan-zone">
        <div class="scan-corners corner-tl"></div>
        <div class="scan-corners corner-tr"></div>
        <div class="scan-corners corner-bl"></div>
        <div class="scan-corners corner-br"></div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar" id="status">
        🚀 Iniciando aventura...
    </div>

    <!-- Music Toggle -->
    <div class="music-toggle" id="music-toggle" onclick="toggleMusic()">
        🔊
    </div>

    <!-- AR Card Overlay (Fallback 2D) -->
    <div class="ar-card-overlay" id="ar-overlay">
        <div class="ar-card" id="ar-card">
            <div class="mascot-container">
                <div class="mascot-emoji" id="mascot">🤖</div>
            </div>
            <div class="word-title" id="word-title"></div>
            <div class="definition-text" id="definition-text"></div>
            <div class="points-badge">+10 PUNTOS! 🌟</div>
            <div class="timer-bar">
                <div class="timer-fill" id="timer-fill"></div>
            </div>
        </div>
    </div>

    <!-- Victory Modal -->
    <div class="victory-modal" id="victory-modal">
        <div class="victory-content">
            <div class="victory-title">🎉 ¡VICTORIA! 🎉</div>
            <div class="victory-stars">⭐⭐⭐</div>
            <div class="final-stats">
                <div class="final-stat">📚 15/15 Palabras Encontradas</div>
                <div class="final-stat" id="final-points">🏆 150 Puntos Totales</div>
            </div>
            <button class="restart-btn" onclick="restartGame()">🔄 Jugar de Nuevo</button>
        </div>
    </div>

    <!-- Background Music -->
    <audio id="bg-music" loop>
        <source src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ==================== CONFIGURACIÓN ====================
        
        const GAME_CONFIG = {
            pointsPerWord: 10,
            displayTime: 5000,
            scanInterval: 3000
        };

        // Diccionario de palabras
        const CYBER_DICTIONARY = {
            'PHISHING': {
                definition: 'Técnica de fraude donde atacantes se hacen pasar por entidades legítimas para robar contraseñas y datos personales. ¡Nunca compartas tu información en emails sospechosos!',
                mascot: '🎣',
                color: '#E91E63',
                // FUTURO: model: 'detective.glb', voice: 'phishing.mp3'
            },
            'MALWARE': {
                definition: 'Software malicioso diseñado para infiltrarse y dañar sistemas sin autorización. Incluye virus, troyanos y spyware. ¡Mantén tu antivirus actualizado!',
                mascot: '🦠',
                color: '#F44336'
            },
            'RANSOMWARE': {
                definition: 'Malware que cifra tus archivos y exige un rescate para recuperarlos. La mejor defensa son las copias de seguridad regulares.',
                mascot: '🔒',
                color: '#FF5722'
            },
            'FIREWALL': {
                definition: 'Barrera de seguridad que filtra el tráfico de red, bloqueando conexiones peligrosas. Es tu primera línea de defensa digital.',
                mascot: '🛡️',
                color: '#4CAF50'
            },
            'HACKER': {
                definition: 'Experto en sistemas informáticos. Los "white hat" son éticos y ayudan, los "black hat" atacan ilegalmente.',
                mascot: '👨‍💻',
                color: '#9C27B0'
            },
            'PASSWORD': {
                definition: 'Tu contraseña debe tener 12+ caracteres mezclando letras, números y símbolos. Usa un gestor de contraseñas y nunca repitas la misma.',
                mascot: '🔑',
                color: '#FF9800'
            },
            'CONTRASEÑA': {
                definition: 'Debe tener 12+ caracteres mezclando letras, números y símbolos. Usa un gestor de contraseñas seguro.',
                mascot: '🔑',
                color: '#FF9800'
            },
            'VIRUS': {
                definition: 'Programa que se replica e infecta archivos para robar datos o dañar sistemas. No abras archivos de fuentes desconocidas.',
                mascot: '🦠',
                color: '#E91E63'
            },
            'CIBERSEGURIDAD': {
                definition: 'Conjunto de prácticas para proteger sistemas, redes y datos de ataques digitales. ¡Todos somos responsables!',
                mascot: '🔐',
                color: '#2196F3'
            },
            'SPAM': {
                definition: 'Correo basura enviado masivamente con fines publicitarios o fraudulentos. Puede contener malware. ¡Usa filtros y no respondas!',
                mascot: '📧',
                color: '#FF9800'
            },
            'ANTIVIRUS': {
                definition: 'Software que detecta, previene y elimina malware. Escanea archivos y monitorea en tiempo real. ¡Mantenlo actualizado!',
                mascot: '💊',
                color: '#4CAF50'
            },
            'VPN': {
                definition: 'Red Privada Virtual que cifra tu conexión, ocultando tu IP y protegiendo tu privacidad online.',
                mascot: '🔐',
                color: '#3F51B5'
            },
            'BACKUP': {
                definition: 'Copia de seguridad de datos importantes. Realiza backups regularmente para protegerte contra pérdida de información.',
                mascot: '💾',
                color: '#00BCD4'
            },
            'CIFRADO': {
                definition: 'Proceso de codificar información para que solo personas autorizadas puedan leerla. Esencial para datos sensibles.',
                mascot: '🔐',
                color: '#9C27B0'
            },
            'TECLADO': {
                definition: 'Dispositivo de entrada con teclas para introducir texto, números y comandos en computadoras y dispositivos.',
                mascot: '⌨️',
                color: '#607D8B'
            }
        };

        // ==================== VARIABLES GLOBALES ====================
        
        let worker = null;
        let video = null;
        let canvas = null;
        let ctx = null;
        let isScanning = false;
        let scanInterval = null;
        let foundWords = new Set();
        let totalPoints = 0;
        let currentWord = null;
        let hideTimeout = null;
        let musicPlaying = false;
        
        const bgMusic = document.getElementById('bg-music');
        const totalWords = Object.keys(CYBER_DICTIONARY).length;

        // ==================== INICIALIZACIÓN ====================
        
        window.addEventListener('DOMContentLoaded', async () => {
            video = document.getElementById('camera');
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');

            updateStatus('📷 Iniciando cámara...');

            // Iniciar cámara
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }
                });
                video.srcObject = stream;
                
                updateStatus('⏳ Cargando detector de palabras...');
            } catch (err) {
                updateStatus('❌ No se puede acceder a la cámara');
                return;
            }

            // Inicializar OCR
            try {
                worker = await Tesseract.createWorker('spa');
                await worker.setParameters({
                    tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZÁÉÍÓÚÑ ',
                });
                
                updateStatus('✅ ¡Listo! Busca palabras para escanear 🔍');
                
                // Auto-start música
                setTimeout(() => {
                    bgMusic.play().catch(e => console.log('Música requiere interacción'));
                    musicPlaying = true;
                }, 1000);
                
                // Iniciar escaneo
                setTimeout(startScanning, 2000);
            } catch (err) {
                updateStatus('❌ Error al cargar OCR');
                console.error(err);
            }
        });

        // ==================== ESCANEO OCR ====================
        
        function startScanning() {
            if (isScanning) return;
            
            isScanning = true;
            updateStatus('🔍 Escaneando... Apunta a una palabra', true);
            
            scanForWords();
            scanInterval = setInterval(scanForWords, GAME_CONFIG.scanInterval);
        }

        async function scanForWords() {
            if (!video.videoWidth || !worker || currentWord) return;

            try {
                // Capturar y procesar
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);

                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                enhanceForOCR(imageData);
                ctx.putImageData(imageData, 0, 0);

                // Reconocer
                const { data: { text } } = await worker.recognize(canvas);
                
                if (text.trim().length < 3) return;
                
                const cleanText = text.toUpperCase()
                    .replace(/[^A-ZÁÉÍÓÚÑ\s]/g, '')
                    .replace(/\s+/g, ' ')
                    .trim();

                // Buscar palabras
                for (const word in CYBER_DICTIONARY) {
                    if (cleanText.includes(word) && !foundWords.has(word)) {
                        wordFound(word);
                        return;
                    }
                }
            } catch (err) {
                console.error('Error OCR:', err);
            }
        }

        function enhanceForOCR(imageData) {
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
                const contrast = 1.5;
                let adjusted = ((avg - 128) * contrast) + 128;
                adjusted = Math.max(0, Math.min(255, adjusted));
                const final = adjusted > 140 ? 255 : 0;
                data[i] = data[i + 1] = data[i + 2] = final;
            }
        }

        // ==================== DETECCIÓN DE PALABRA ====================
        
        function wordFound(word) {
            currentWord = word;
            foundWords.add(word);
            totalPoints += GAME_CONFIG.pointsPerWord;
            
            updateStats();
            showDefinition(word);
            createConfetti();
            
            // Vibración
            if (navigator.vibrate) {
                navigator.vibrate([200, 100, 200, 100, 200]);
            }
            
            // Verificar victoria
            if (foundWords.size >= totalWords) {
                setTimeout(showVictory, GAME_CONFIG.displayTime + 500);
            }
        }

        function showDefinition(word) {
            const data = CYBER_DICTIONARY[word];
            const overlay = document.getElementById('ar-overlay');
            const card = document.getElementById('ar-card');
            const mascot = document.getElementById('mascot');
            const title = document.getElementById('word-title');
            const definition = document.getElementById('definition-text');
            const timerFill = document.getElementById('timer-fill');
            
            // Configurar
            mascot.textContent = data.mascot;
            title.textContent = word;
            title.style.color = data.color;
            card.style.borderColor = data.color;
            definition.textContent = data.definition;
            
            // Mostrar
            overlay.classList.add('show');
            
            // Reiniciar timer
            timerFill.style.animation = 'none';
            setTimeout(() => {
                timerFill.style.animation = `timerShrink ${GAME_CONFIG.displayTime}ms linear`;
            }, 10);
            
            // Auto-hide
            hideTimeout = setTimeout(hideDefinition, GAME_CONFIG.displayTime);
        }

        function hideDefinition() {
            document.getElementById('ar-overlay').classList.remove('show');
            currentWord = null;
            updateStatus('🔍 ¡Busca la siguiente palabra!', true);
        }

        // ==================== UI UPDATES ====================
        
        function updateStats() {
            document.getElementById('word-count').textContent = `${foundWords.size}/${totalWords}`;
            document.getElementById('points').textContent = totalPoints;
        }

        function updateStatus(text, scanning = false) {
            const status = document.getElementById('status');
            status.textContent = text;
            
            if (scanning) {
                status.classList.add('scanning');
            } else {
                status.classList.remove('scanning');
            }
        }

        function showVictory() {
            clearInterval(scanInterval);
            document.getElementById('final-points').textContent = `🏆 ${totalPoints} Puntos Totales`;
            document.getElementById('victory-modal').classList.add('show');
            
            // Confetti masivo
            for (let i = 0; i < 100; i++) {
                setTimeout(() => createConfetti(), i * 30);
            }
        }

        function restartGame() {
            foundWords.clear();
            totalPoints = 0;
            currentWord = null;
            updateStats();
            document.getElementById('victory-modal').classList.remove('show');
            startScanning();
        }

        function createConfetti() {
            const colors = ['#FFD93D', '#FF6B9D', '#6BCF7F', '#4ECDC4', '#C06C84'];
            for (let i = 0; i < 20; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 0.5 + 's';
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 3000);
            }
        }

        function toggleMusic() {
            const toggle = document.getElementById('music-toggle');
            if (musicPlaying) {
                bgMusic.pause();
                toggle.textContent = '🔇';
                musicPlaying = false;
            } else {
                bgMusic.play();
                toggle.textContent = '🔊';
                musicPlaying = true;
            }
        }

        // Cleanup
        window.addEventListener('beforeunload', () => {
            if (scanInterval) clearInterval(scanInterval);
            if (hideTimeout) clearTimeout(hideTimeout);
            if (worker) worker.terminate();
        });
    </script>
</body>
</html>
